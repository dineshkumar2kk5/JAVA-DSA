<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Striver's A2Z DSA Sheet Tracker</title>
<meta name="description" content="Track your progress on Striver's A2Z DSA Course — 455+ problems with LeetCode, GFG & TakeUForward links.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b14;
  --surface:#0d1117;
  --card:#111827;
  --card2:#151d2c;
  --border:#1e2d3d;
  --border2:#243447;
  --accent:#6366f1;
  --accent-glow:rgba(99,102,241,0.3);
  --accent2:#10b981;
  --accent2-glow:rgba(16,185,129,0.25);
  --accent3:#f59e0b;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --muted:#4b5563;
  --easy:#10b981;
  --easy-bg:rgba(16,185,129,0.1);
  --med:#f59e0b;
  --med-bg:rgba(245,158,11,0.1);
  --hard:#ef4444;
  --hard-bg:rgba(239,68,68,0.1);
  --solved-bg:rgba(16,185,129,0.06);
  --rev-bg:rgba(245,158,11,0.07);
  --radius:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;line-height:1.5}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* HEADER */
#header{
  background:rgba(13,17,23,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  position:sticky;top:0;z-index:200;
}
.header-inner{
  max-width:1280px;margin:0 auto;
  display:flex;align-items:center;gap:16px;
  height:60px;flex-wrap:wrap;padding:8px 0;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#818cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 20px var(--accent-glow);
}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-0.5px;white-space:nowrap;
  background:linear-gradient(90deg,#a5b4fc,#6366f1,#10b981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

.progress-section{flex:1;min-width:180px;display:flex;align-items:center;gap:10px}
.global-bar-wrap{flex:1;background:var(--border);height:6px;border-radius:3px;overflow:hidden}
.global-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
#global-stats{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:600}

.header-btns{display:flex;gap:6px;align-items:center}
.btn{
  background:var(--card);border:1px solid var(--border2);
  color:var(--text2);padding:6px 14px;border-radius:7px;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;font-family:inherit;
}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.08)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#818cf8);
  border:none;color:#fff;
  box-shadow:0 2px 10px var(--accent-glow);
}
.btn-primary:hover{opacity:.9;color:#fff;transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}
.btn-danger:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.08)}

/* STATS DASHBOARD */
#stats-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
}
.stats-inner{
  max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 16px;
  transition:border-color .2s;cursor:default;
}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}
.stat-easy .stat-value{color:var(--easy)}
.stat-med .stat-value{color:var(--med)}
.stat-hard .stat-value{color:var(--hard)}
.stat-total .stat-value{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-rev .stat-value{color:var(--accent3)}

/* CONTROLS */
#controls{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 24px;
  position:sticky;top:60px;z-index:190;
}
.controls-inner{
  max-width:1280px;margin:0 auto;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none}
input[type=text]{
  background:var(--card);border:1px solid var(--border2);
  color:var(--text);padding:7px 12px 7px 32px;
  border-radius:7px;font-size:13px;width:100%;
  outline:none;font-family:inherit;transition:border-color .15s;
}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select{
  background:var(--card);border:1px solid var(--border2);
  color:var(--text);padding:7px 10px;border-radius:7px;
  font-size:12px;cursor:pointer;outline:none;font-family:inherit;
  transition:border-color .15s;
}
select:focus{border-color:var(--accent)}
.ctrl-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
.expand-btns{display:flex;gap:4px}

/* MAIN CONTENT */
#main{padding:20px 24px;max-width:1280px;margin:0 auto;padding-bottom:60px}

/* STEP CARDS */
.step{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:14px;
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.step:hover{border-color:var(--border2)}
.step.has-progress{border-color:rgba(99,102,241,0.25)}

.step-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.step-header:hover{background:rgba(99,102,241,0.04)}

.step-num{
  background:linear-gradient(135deg,var(--accent),#818cf8);
  color:#fff;border-radius:7px;
  padding:3px 10px;font-size:11px;font-weight:800;
  flex-shrink:0;letter-spacing:.3px;
  box-shadow:0 2px 8px var(--accent-glow);
}
.step-title{font-size:14px;font-weight:700;flex:1;letter-spacing:-0.2px}
.step-count{font-size:11px;color:var(--text2);flex-shrink:0}

.step-progress-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.step-bar{width:90px;background:var(--border);height:4px;border-radius:2px;overflow:hidden}
.step-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s cubic-bezier(.4,0,.2,1)}
.step-pct{font-size:11px;color:var(--text2);min-width:28px;text-align:right;font-weight:600}

.chevron{color:var(--text2);font-size:12px;transition:transform .25s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* STEP BODY */
.step-body{display:none;border-top:1px solid var(--border)}
.step-body.open{display:block}

/* TOPICS */
.topic{border-bottom:1px solid var(--border)}
.topic:last-child{border-bottom:none}

.topic-header{
  padding:9px 18px 9px 44px;
  font-size:11px;font-weight:700;
  color:var(--text2);
  text-transform:uppercase;letter-spacing:.7px;
  background:rgba(255,255,255,.018);
  cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:color .15s,background .15s;
}
.topic-header:hover{color:var(--text);background:rgba(255,255,255,.03)}
.topic-chevron{font-size:10px;transition:transform .2s;flex-shrink:0}
.topic-chevron.open{transform:rotate(90deg)}
.topic-count{color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px}
.topic-body{display:none}
.topic-body.open{display:block}

/* PROBLEM ROWS */
.prob-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px 8px 44px;
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .12s;
  cursor:pointer;position:relative;
}
.prob-row:last-child{border-bottom:none}
.prob-row:hover{background:rgba(255,255,255,.03)}
.prob-row.solved{background:var(--solved-bg)}
.prob-row.solved:hover{background:rgba(16,185,129,0.1)}
.prob-row.revision{background:var(--rev-bg)}
.prob-row.revision:hover{background:rgba(245,158,11,0.12)}

/* Subtle left accent bar */
.prob-row.solved::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--easy)}
.prob-row.revision::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--med)}

.check-box{
  width:18px;height:18px;border:1.5px solid var(--border2);
  border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .15s;
}
.prob-row.solved .check-box{background:var(--easy);border-color:var(--easy);color:#fff}
.prob-row.revision .check-box{background:var(--med);border-color:var(--med);color:#fff}
.prob-row:not(.solved):not(.revision):hover .check-box{border-color:var(--accent);background:rgba(99,102,241,0.1)}

.prob-num{font-size:10px;color:var(--muted);min-width:28px;font-weight:600;flex-shrink:0}
.prob-name{flex:1;font-size:13px;line-height:1.4;font-weight:500}
.prob-row.solved .prob-name{color:var(--text2)}

.diff-badge{
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  flex-shrink:0;letter-spacing:.3px;
}
.diff-badge.easy{background:var(--easy-bg);color:var(--easy);border:1px solid rgba(16,185,129,0.2)}
.diff-badge.medium{background:var(--med-bg);color:var(--med);border:1px solid rgba(245,158,11,0.2)}
.diff-badge.hard{background:var(--hard-bg);color:var(--hard);border:1px solid rgba(239,68,68,0.2)}
.diff-badge.unknown{background:rgba(100,100,120,.1);color:var(--text2);border:1px solid var(--border)}

.prob-links{display:flex;gap:4px;flex-shrink:0}
.prob-link{
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  text-decoration:none;border:1px solid;
  transition:all .15s;display:inline-flex;align-items:center;gap:3px;
}
.lc-link{color:#f5a623;border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.06)}
.lc-link:hover{background:rgba(245,166,35,.18);transform:translateY(-1px)}
.gfg-link{color:#2f8d46;border-color:rgba(47,141,70,.3);background:rgba(47,141,70,.06)}
.gfg-link:hover{background:rgba(47,141,70,.18);transform:translateY(-1px)}
.yt-link{color:#ff4b4b;border-color:rgba(255,0,0,.3);background:rgba(255,0,0,.06)}
.yt-link:hover{background:rgba(255,0,0,.18);transform:translateY(-1px)}
.article-link{color:#38bdf8;border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.06)}
.article-link:hover{background:rgba(56,189,248,.18);transform:translateY(-1px)}

.rev-btn{
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;
  border:1px solid var(--border);
  background:none;color:var(--text2);
  cursor:pointer;transition:all .15s;
  flex-shrink:0;font-family:inherit;
}
.rev-btn:hover{border-color:var(--med);color:var(--med);background:var(--rev-bg)}
.prob-row.revision .rev-btn{border-color:var(--med);color:var(--med);background:var(--rev-bg)}

/* EMPTY FILTER STATE */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text2);
}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state h3{font-size:16px;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:13px}

/* TOAST */
#toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--accent);color:#fff;
  padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:600;
  display:none;z-index:999;
  box-shadow:0 8px 24px rgba(99,102,241,0.4);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}}

/* HIDDEN */
.hidden-prob,.hidden-topic,.hidden-step{display:none!important}

/* RESPONSIVE */
@media(max-width:640px){
  #header,#controls,#stats-bar{padding-left:14px;padding-right:14px}
  #main{padding:12px 14px 60px}
  .step-header{padding:12px 14px}
  .prob-row{padding:8px 14px 8px 36px}
  .topic-header{padding-left:36px}
  .step-bar{width:60px}
  .prob-links{display:none}
  .stat-card{padding:10px 12px}
}

/* ANIMATIONS */
.step-body.open{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.prob-row{animation:rowIn .15s ease both}
@keyframes rowIn{from{opacity:0}to{opacity:1}}

/* PROBLEM NAME — clickable hint */
.prob-name{
  cursor:pointer;
  transition:color .15s;
}
.prob-name:hover{color:var(--accent)!important;text-decoration:underline;text-underline-offset:3px}

/* ====== SIDE DRAWER ====== */
#drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:800;opacity:0;pointer-events:none;
  transition:opacity .25s;
  backdrop-filter:blur(4px);
}
#drawer-overlay.active{opacity:1;pointer-events:all}

#drawer{
  position:fixed;top:0;right:-540px;bottom:0;
  width:min(540px,100vw);
  background:#0d1117;
  border-left:1px solid var(--border2);
  z-index:900;
  display:flex;flex-direction:column;
  transition:right .3s cubic-bezier(.4,0,.2,1);
  box-shadow:-20px 0 60px rgba(0,0,0,.5);
}
#drawer.open{right:0}

#drawer-head{
  padding:18px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;
  background:var(--surface);
  flex-shrink:0;
}
#drawer-title{
  flex:1;font-size:16px;font-weight:700;
  letter-spacing:-.3px;line-height:1.35;
}
#drawer-diff{
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  flex-shrink:0;margin-top:2px;
}
#drawer-close{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--border2);
  background:var(--card);color:var(--text2);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
  font-family:inherit;
}
#drawer-close:hover{border-color:var(--accent);color:var(--accent)}

#drawer-body{flex:1;overflow-y:auto;padding:20px}

.drawer-section{margin-bottom:22px}
.drawer-section-title{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;
  color:var(--text2);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}

/* Big platform link buttons */
.platform-btns{display:flex;flex-direction:column;gap:10px}
.platform-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:10px;
  text-decoration:none;border:1px solid;
  transition:all .2s;cursor:pointer;
  font-family:inherit;
}
.platform-btn:hover{transform:translateX(4px)}
.platform-btn-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.platform-btn-info{flex:1}
.platform-btn-name{font-size:13px;font-weight:700;display:block}
.platform-btn-desc{font-size:11px;color:var(--text2);margin-top:1px}
.platform-btn-arrow{font-size:16px;color:var(--text2)}
.platform-btn:hover .platform-btn-arrow{color:inherit}

.btn-lc{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.05);color:#f5a623}
.btn-lc:hover{border-color:rgba(245,166,35,.6);background:rgba(245,166,35,.12)}
.btn-lc .platform-btn-icon{background:rgba(245,166,35,.1)}

.btn-gfg{border-color:rgba(47,141,70,.3);background:rgba(47,141,70,.05);color:#2f8d46}
.btn-gfg:hover{border-color:rgba(47,141,70,.6);background:rgba(47,141,70,.12)}
.btn-gfg .platform-btn-icon{background:rgba(47,141,70,.1)}

.btn-yt{border-color:rgba(255,0,0,.3);background:rgba(255,0,0,.05);color:#ff4b4b}
.btn-yt:hover{border-color:rgba(255,0,0,.6);background:rgba(255,0,0,.15)}
.btn-yt .platform-btn-icon{background:rgba(255,0,0,.1)}

.btn-article{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.05);color:#38bdf8}
.btn-article:hover{border-color:rgba(56,189,248,.6);background:rgba(56,189,248,.15)}
.btn-article .platform-btn-icon{background:rgba(56,189,248,.1)}

.btn-disabled{opacity:.35;pointer-events:none;cursor:not-allowed}

/* Action row inside drawer */
.drawer-actions{display:flex;gap:8px;margin-top:4px}
.drawer-action-btn{
  flex:1;padding:11px 8px;
  border-radius:9px;border:1px solid var(--border2);
  background:var(--card);color:var(--text2);
  font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;
  font-family:inherit;text-align:center;
}
.drawer-action-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08)}
.drawer-action-btn.active-solved{border-color:var(--easy);color:var(--easy);background:rgba(16,185,129,.1)}
.drawer-action-btn.active-rev{border-color:var(--med);color:var(--med);background:rgba(245,158,11,.1)}

/* Notes textarea */
.notes-area{
  width:100%;min-height:90px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:8px;padding:10px 12px;
  color:var(--text);font-size:12px;
  resize:vertical;outline:none;
  font-family:inherit;line-height:1.5;
  transition:border-color .15s;
}
.notes-area:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.notes-area::placeholder{color:var(--muted)}
.notes-save-btn{
  margin-top:6px;padding:6px 16px;
  background:var(--accent);border:none;
  color:#fff;border-radius:7px;
  font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:opacity .15s;
}
.notes-save-btn:hover{opacity:.85}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-inner">
    <a class="logo" href="#" onclick="return false">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">Striver's A2Z DSA</span>
    </a>
    <div class="progress-section">
      <div class="global-bar-wrap"><div class="global-bar-fill" id="global-fill"></div></div>
      <div id="global-stats">0 / 455</div>
    </div>
    <div class="header-btns">
      <button class="btn btn-primary" onclick="exportData()">⬇ Export</button>
      <button class="btn" onclick="document.getElementById('imp').click()">⬆ Import</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-danger" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div class="stats-inner">
    <div class="stat-card stat-total">
      <div class="stat-label">Total Solved</div>
      <div class="stat-value" id="st-total">0</div>
      <div class="stat-sub" id="st-total-sub">out of 455</div>
    </div>
    <div class="stat-card stat-easy">
      <div class="stat-label">Easy</div>
      <div class="stat-value" id="st-easy">0</div>
      <div class="stat-sub" id="st-easy-sub">solved</div>
    </div>
    <div class="stat-card stat-med">
      <div class="stat-label">Medium</div>
      <div class="stat-value" id="st-med">0</div>
      <div class="stat-sub" id="st-med-sub">solved</div>
    </div>
    <div class="stat-card stat-hard">
      <div class="stat-label">Hard</div>
      <div class="stat-value" id="st-hard">0</div>
      <div class="stat-sub" id="st-hard-sub">solved</div>
    </div>

// ===================== PROGRESS =====================
let progress={};
try{const s=localStorage.getItem('a2z_v3');if(s)progress=JSON.parse(s);}catch(e){}

function saveAll(){
  try{localStorage.setItem('a2z_v3',JSON.stringify(progress));}catch(e){}
  updateGlobal();
}

// Collect stats
let totalProbs=0, totalEasy=0, totalMed=0, totalHard=0;
DATA.forEach(s=>s.topics.forEach(t=>t.probs.forEach(p=>{
  totalProbs++;
  if(p.d==='easy')totalEasy++;
  else if(p.d==='medium')totalMed++;
  else if(p.d==='hard')totalHard++;
})));

// ===================== TOGGLE LOGIC =====================
function toggle(id, e){
  e.stopPropagation();
  const st=progress[id]||'';
  progress[id]= st==='solved' ? '' : 'solved';
  renderRow(id);
  saveAll();
}
function toggleRev(id, e){
  e.stopPropagation();
  const st=progress[id]||'';
  progress[id]= st==='revision' ? (st==='solved'?'solved':'') : 'revision';
  if(progress[id]==='')progress[id]='revision';
  renderRow(id);
  saveAll();
}
function renderRow(id){
  const el=document.getElementById('r_'+id);
  if(!el)return;
  const st=progress[id]||'';
  el.className='prob-row'+(st?' '+st:'');
  const cb=el.querySelector('.check-box');
  cb.textContent=st==='solved'?'✓':st==='revision'?'↻':'';
  const rb=el.querySelector('.rev-btn');
  rb.textContent=st==='revision'?'★ Rev':'☆ Rev';
  // Update parent step
  const stepEl=el.closest('.step');
  if(stepEl)updateStep(stepEl);
}

function updateStep(stepEl){
  if(!stepEl)return;
  const rows=[...stepEl.querySelectorAll('.prob-row')];
  const done=rows.filter(r=>r.classList.contains('solved')||r.classList.contains('revision')).length;
  const pct=rows.length?Math.round(done/rows.length*100):0;
  const fill=stepEl.querySelector('.step-fill');
  const pctEl=stepEl.querySelector('.step-pct');
  if(fill)fill.style.width=pct+'%';
  if(pctEl)pctEl.textContent=pct+'%';
  stepEl.classList.toggle('has-progress', done>0);
}

function updateGlobal(){
  let solved=0, easy=0, med=0, hard=0, rev=0;
  DATA.forEach(s=>s.topics.forEach(t=>t.probs.forEach(p=>{
    const st=progress[p.id]||'';
    if(st==='solved'||st==='revision'){
      solved++;
      if(p.d==='easy')easy++;
      else if(p.d==='medium')med++;
      else if(p.d==='hard')hard++;
    }
    if(st==='revision')rev++;
  })));
  const pct=Math.round(solved/totalProbs*100);
  document.getElementById('global-fill').style.width=pct+'%';
  document.getElementById('global-stats').textContent=solved+' / '+totalProbs;
  document.getElementById('st-total').textContent=solved;
  document.getElementById('st-total-sub').textContent='out of '+totalProbs;
  document.getElementById('st-easy').textContent=easy;
  document.getElementById('st-easy-sub').textContent='of '+totalEasy;
  document.getElementById('st-med').textContent=med;
  document.getElementById('st-med-sub').textContent='of '+totalMed;
  document.getElementById('st-hard').textContent=hard;
  document.getElementById('st-hard-sub').textContent='of '+totalHard;
  document.getElementById('st-rev').textContent=rev;
  document.getElementById('st-pct').textContent=pct+'%';
  const msgs=['just started!','keep going!','quarter done!','halfway there!','almost there!','completed! 🎉'];
  const mi=pct>=100?5:pct>=75?4:pct>=50?3:pct>=25?2:pct>0?1:0;
  document.getElementById('st-streak').textContent=msgs[mi];
}

// ===================== BUILD HTML =====================
// Build a flat map of id -> {prob, stepTitle, topicTitle, num}
let probMap={};
function buildProbMap(){
  let n=0;
  DATA.forEach(step=>step.topics.forEach(topic=>topic.probs.forEach(p=>{
    n++;
    probMap[p.id]={...p,stepTitle:step.title,topicTitle:topic.t,num:n};
  })));
}
buildProbMap();



function buildHTML(){
  let html='';
  let pNum=0;
  DATA.forEach((step,si)=>{
    const totalInStep=step.topics.reduce((a,t)=>a+t.probs.length,0);
    html+=`<div class="step" id="step_${si}">
<div class="step-header" onclick="toggleStep(${si})">
<span class="step-num">Step ${step.step}</span>
<span class="step-title">${step.title}</span>
<span class="step-count">${totalInStep} problems</span>
<div class="step-progress-wrap">
<div class="step-bar"><div class="step-fill" style="width:0%"></div></div>
<span class="step-pct">0%</span>
</div>
<span class="chevron" id="chev_${si}">▼</span>
</div>
<div class="step-body" id="sbody_${si}">`;
    step.topics.forEach((topic,ti)=>{
      html+=`<div class="topic" id="topic_${si}_${ti}">
<div class="topic-header" onclick="toggleTopic(${si},${ti})">
<span class="topic-chevron" id="tchev_${si}_${ti}">▶</span>
<span>${topic.t}</span>
<span class="topic-count">&nbsp;(${topic.probs.length})</span>
</div>
<div class="topic-body" id="tbody_${si}_${ti}">`;
      topic.probs.forEach(p=>{
        pNum++;
        const st=progress[p.id]||'';
        const cls=st?` ${st}`:'';
        const chk=st==='solved'?'✓':st==='revision'?'↻':'';
        const rev=st==='revision'?'★ Rev':'☆ Rev';
        let links='';
        if(p.lc)links+=`<a class="prob-link lc-link" href="https://leetcode.com/problems/list/?problemIds=${p.lc}" target="_blank" onclick="event.stopPropagation()">LC</a>`;
        if(p.gfg)links+=`<a class="prob-link gfg-link" href="https://www.geeksforgeeks.org/problems/${p.gfg}" target="_blank" onclick="event.stopPropagation()">GFG</a>`;
        const ytUrl='https://www.youtube.com/results?search_query='+encodeURIComponent(p.n+' dsa problem solution');
        const articleUrl='https://www.google.com/search?q='+encodeURIComponent(p.n+' dsa problem solution');
        links+=`<a class="prob-link yt-link" href="${ytUrl}" target="_blank" onclick="event.stopPropagation()">YT</a>`;
        links+=`<a class="prob-link article-link" href="${articleUrl}" target="_blank" onclick="event.stopPropagation()">SRC</a>`;
        html+=`<div class="prob-row${cls}" id="r_${p.id}">
<div class="check-box" onclick="toggle('${p.id}',event)">${chk}</div>
<span class="prob-num">${String(pNum).padStart(3,'0')}</span>
<span class="prob-name" onclick="openDrawer('${p.id}',event)">${p.n}</span>
<span class="diff-badge ${p.d||'unknown'}" onclick="openDrawer('${p.id}',event)">${p.d||'?'}</span>
<div class="prob-links">${links}</div>
<button class="rev-btn" onclick="toggleRev('${p.id}',event)">${rev}</button>
</div>`;
      });
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('main').innerHTML=html;
  DATA.forEach((_,si)=>updateStep(document.getElementById('step_'+si)));
  updateGlobal();
}

// ===================== TOGGLE OPEN/CLOSE =====================
function toggleStep(si){
  const body=document.getElementById('sbody_'+si);
  const chev=document.getElementById('chev_'+si);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function toggleTopic(si,ti){
  const body=document.getElementById('tbody_'+si+'_'+ti);
  const chev=document.getElementById('tchev_'+si+'_'+ti);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function expandAll(){
  DATA.forEach((_,si)=>{
    document.getElementById('sbody_'+si).classList.add('open');
    document.getElementById('chev_'+si).classList.add('open');
    _.topics.forEach((__,ti)=>{
      document.getElementById('tbody_'+si+'_'+ti).classList.add('open');
      document.getElementById('tchev_'+si+'_'+ti).classList.add('open');
    });
  });
}
function collapseAll(){
  DATA.forEach((_,si)=>{
    document.getElementById('sbody_'+si).classList.remove('open');
    document.getElementById('chev_'+si).classList.remove('open');
    _.topics.forEach((__,ti)=>{
      document.getElementById('tbody_'+si+'_'+ti).classList.remove('open');
      document.getElementById('tchev_'+si+'_'+ti).classList.remove('open');
    });
  });
}

// ===================== FILTER =====================
function filterProblems(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const fs=document.getElementById('fStatus').value;
  const fd=document.getElementById('fDiff').value;
  const isFiltering=q||fs||fd;

  DATA.forEach((step,si)=>{
    let stepHasVisible=false;
    step.topics.forEach((topic,ti)=>{
      let topicHasVisible=false;
      topic.probs.forEach(p=>{
        const row=document.getElementById('r_'+p.id);
        if(!row)return;
        const st=progress[p.id]||'';
        const matchQ=!q||p.n.toLowerCase().includes(q);
        const matchS=!fs||(fs==='solved'&&st==='solved')||(fs==='revision'&&st==='revision')||(fs==='unsolved'&&!st);
        const matchD=!fd||p.d===fd;
        const visible=matchQ&&matchS&&matchD;
        row.classList.toggle('hidden-prob',!visible);
        if(visible){topicHasVisible=true;stepHasVisible=true;}
      });
      const topicEl=document.getElementById('topic_'+si+'_'+ti);
      if(topicEl)topicEl.classList.toggle('hidden-topic',!topicHasVisible);
      if(isFiltering&&topicHasVisible){
        document.getElementById('tbody_'+si+'_'+ti).classList.add('open');
        document.getElementById('tchev_'+si+'_'+ti).classList.add('open');
      }
    });
    const stepEl=document.getElementById('step_'+si);
    if(stepEl)stepEl.classList.toggle('hidden-step',!stepHasVisible);
    if(isFiltering&&stepHasVisible){
      document.getElementById('sbody_'+si).classList.add('open');
      document.getElementById('chev_'+si).classList.add('open');
    }
  });
}

// ===================== EXPORT / IMPORT =====================
function exportData(){
  const data={version:3,progress,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='a2z_dsa_progress.json';
  a.click();
  showToast('✅ Progress exported!');
}
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.progress){
        progress=data.progress;
        saveAll();
        buildHTML();
        showToast('✅ Progress imported!');
      }else{throw new Error();}
    }catch{showToast('❌ Invalid file');}
  };
  reader.readAsText(file);
  e.target.value='';
}
function resetAll(){
  if(confirm('Reset all progress? This cannot be undone.')){
    progress={};
    saveAll();
    buildHTML();
    showToast('🔄 Progress reset');
  }
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.display='none',2500);
}

// ===================== DRAWER =====================

    <div class="platform-btn-icon">📄</div>
    <div class="platform-btn-info">
      <span class="platform-btn-name">Related Article</span>
      <span class="platform-btn-desc">Search for related articles & solutions</span>
    </div>
    <span class="platform-btn-arrow">→</span>
  </a>`;

    linksHtml+=`<a class="platform-btn btn-lc" href="https://leetcode.com/problems/list/?problemIds=${p.lc}" target="_blank">
      <div class="platform-btn-icon">🟡</div>
      <div class="platform-btn-info">
        <span class="platform-btn-name">LeetCode</span>
        <span class="platform-btn-desc">Practice on LeetCode — Problem #${p.lc}</span>
      </div>
      <span class="platform-btn-arrow">→</span>
    </a>`;
  } else {
    linksHtml+=`<div class="platform-btn btn-lc btn-disabled">
      <div class="platform-btn-icon">🟡</div>
      <div class="platform-btn-info">
        <span class="platform-btn-name">LeetCode</span>
        <span class="platform-btn-desc">No LeetCode link for this problem</span>
      </div>
    </div>`;
  }

  if(p.gfg){
    linksHtml+=`<a class="platform-btn btn-gfg" href="https://www.geeksforgeeks.org/problems/${p.gfg}" target="_blank">
      <div class="platform-btn-icon">🟢</div>
      <div class="platform-btn-info">
        <span class="platform-btn-name">GeeksForGeeks</span>
        <span class="platform-btn-desc">Practice on GFG platform</span>
      </div>
      <span class="platform-btn-arrow">→</span>
    </a>`;
  } else {
    linksHtml+=`<div class="platform-btn btn-gfg btn-disabled">
      <div class="platform-btn-icon">🟢</div>
      <div class="platform-btn-info">
        <span class="platform-btn-name">GeeksForGeeks</span>
        <span class="platform-btn-desc">No GFG link for this problem</span>
      </div>
    </div>`;
  }

  container.innerHTML=linksHtml;

  // Notes
  document.getElementById('drawer-notes').value=notes[id]||'';

  // Open
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('active');

function updateDrawerActions(id){
  const st=progress[id]||'';
  const btnS=document.getElementById('da-solve');
  const btnR=document.getElementById('da-rev');
  btnS.className='drawer-action-btn'+(st==='solved'?' active-solved':'');
  btnS.textContent=st==='solved'?'✓ Solved — Click to Undo':'✓ Mark as Solved';
  btnR.className='drawer-action-btn'+(st==='revision'?' active-rev':'');
  btnR.textContent=st==='revision'?'↻ In Revision — Click to Undo':'↻ Mark for Revision';
}

function drawerToggleSolve(){
  if(!currentDrawerId)return;
  const st=progress[currentDrawerId]||'';
  progress[currentDrawerId]=st==='solved'?'':'solved';
  renderRow(currentDrawerId);
  saveAll();
  updateDrawerActions(currentDrawerId);
}
function drawerToggleRev(){
  if(!currentDrawerId)return;
  const st=progress[currentDrawerId]||'';
  progress[currentDrawerId]=st==='revision'?'':'revision';
  renderRow(currentDrawerId);
  saveAll();
  updateDrawerActions(currentDrawerId);
}

function saveNote(){
  if(!currentDrawerId)return;
  notes[currentDrawerId]=document.getElementById('drawer-notes').value;
  try{localStorage.setItem('a2z_notes',JSON.stringify(notes));}catch(e){}
  showToast('📝 Note saved!');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('active');
  document.body.style.overflow='';
  currentDrawerId=null;
}

// Keyboard close
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

// ===================== INIT =====================
buildHTML();
</script>
